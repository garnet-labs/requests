name: Garnet Requests CI

on:
  workflow_dispatch:

jobs:
  dep-install:
    name: pip install requests (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[security,socks]" 2>/dev/null || pip install -e . || pip install requests
          pip install pytest pytest-httpbin 2>/dev/null || true

      - name: List installed packages
        run: pip list | head -50

  lint:
    name: Lint (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.0
